<!DOCTYPE html>
<html>
<head>
    <title>SVG到PNG转换器</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        #svgContainer { border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; }
        .button { padding: 10px 20px; background: #1E88E5; color: white; border: none; cursor: pointer; }
        #downloadLink { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SVG到PNG转换器</h1>
        
        <div id="svgContainer">
            <!-- 这里插入SVG内容 -->
            <svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
              <!-- 背景 - 圆角矩形 -->
              <rect x="32" y="32" width="448" height="448" rx="90" ry="90" fill="#1E88E5" />
              
              <!-- 文件夹 - 现代化渐变 -->
              <path d="M115 140 L175 140 L200 115 L340 115 L365 140 L397 140 Q410 140 410 153 L410 370 Q410 383 397 383 L115 383 Q102 383 102 370 L102 153 Q102 140 115 140 Z" fill="url(#folderGradient)" />
              
              <!-- 文件夹渐变 -->
              <defs>
                <linearGradient id="folderGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#FFE082" />
                  <stop offset="100%" stop-color="#FFC107" />
                </linearGradient>
              </defs>
              
              <!-- 文档线条 -->
              <rect x="145" y="230" width="220" height="26" rx="13" ry="13" fill="white" />
              <rect x="145" y="280" width="220" height="26" rx="13" ry="13" fill="white" />
              <rect x="145" y="330" width="170" height="26" rx="13" ry="13" fill="white" />
              
              <!-- 加号按钮 -->
              <circle cx="390" cy="150" r="55" fill="#29B6F6" />
              <path d="M390 125 L390 175 M365 150 L415 150" stroke="white" stroke-width="14" stroke-linecap="round" />
            </svg>
        </div>
        
        <button id="convertBtn" class="button">转换为PNG</button>
        <a id="downloadLink" class="button" download="folder_icon.png">下载PNG</a>
        
        <script>
            document.getElementById('convertBtn').addEventListener('click', function() {
                const svgElem = document.querySelector('#svgContainer svg');
                const svgData = new XMLSerializer().serializeToString(svgElem);
                const canvas = document.createElement('canvas');
                canvas.width = 256;  // 设置输出尺寸
                canvas.height = 256;
                
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'transparent';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const img = new Image();
                const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(svgBlob);
                
                img.onload = function() {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    URL.revokeObjectURL(url);
                    
                    const imgURI = canvas.toDataURL('image/png');
                    document.getElementById('downloadLink').href = imgURI;
                    document.getElementById('downloadLink').style.display = 'inline-block';
                    
                    // 显示转换后的图像
                    const resultImg = document.createElement('img');
                    resultImg.src = imgURI;
                    resultImg.style.border = '1px solid #ccc';
                    resultImg.style.marginTop = '20px';
                    document.querySelector('.container').appendChild(resultImg);
                };
                
                img.src = url;
            });
        </script>
    </div>
</body>
</html>
